name: "Repo Guard"
description: "Manifest-driven architecture validation: enforce structure, block forbidden patterns, detect drift. No dependencies."
author: "Repo Guard"
branding:
  icon: "shield"
  color: "blue"

inputs:
  repo-path:
    description: "Path to the repository root to validate."
    required: false
    default: "."
  manifest:
    description: "Explicit path to the manifest. Auto-discovered (repo-guard.json) if omitted."
    required: false
    default: ""
  fail-on-drift:
    description: "Fail the job (exit 1) if any error-level violations are found."
    required: false
    default: "true"
  format:
    description: "Report format: pretty or json."
    required: false
    default: "pretty"
  report-path:
    description: "Where to write the JSON report artifact."
    required: false
    default: "repo-guard-report.json"

outputs:
  errors:
    description: "Number of error-level violations."
    value: ${{ steps.guard.outputs.errors }}
  warnings:
    description: "Number of warning-level violations."
    value: ${{ steps.guard.outputs.warnings }}
  status:
    description: "ACTIVE if a manifest was found, DORMANT otherwise."
    value: ${{ steps.guard.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run Repo Guard
      id: guard
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.report-path }}
      run: |
        set -o pipefail
        GUARD="${{ github.action_path }}/src/repo_guard.py"
        ARGS=(--repo "${{ inputs.repo-path }}" --format "${{ inputs.format }}" --output "${{ inputs.report-path }}")
        if [ -n "${{ inputs.manifest }}" ]; then ARGS+=(--manifest "${{ inputs.manifest }}"); fi
        if [ "${{ inputs.fail-on-drift }}" = "true" ]; then ARGS+=(--fail-on-drift); fi

        GUARD_EXIT=0
        python "$GUARD" "${ARGS[@]}" || GUARD_EXIT=$?

        if [ -f "${{ inputs.report-path }}" ]; then
          python - <<'PY' >> "$GITHUB_OUTPUT"
        import json, os
        r = json.load(open(os.environ["REPORT_PATH"]))
        s = r.get("summary", {})
        print(f"errors={s.get('errors',0)}")
        print(f"warnings={s.get('warnings',0)}")
        print(f"status={'ACTIVE' if r.get('manifest_found') else 'DORMANT'}")
        PY
        fi
        exit $GUARD_EXIT

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repo-guard-report
        path: ${{ inputs.report-path }}
        if-no-files-found: warn
