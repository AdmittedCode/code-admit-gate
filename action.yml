name: "Code Admit Gate"
description: "Manifest-driven architecture validation: enforce structure, block forbidden patterns, detect drift. No dependencies."
author: "Code Admit Gate"
branding:
  icon: "shield"
  color: "blue"

inputs:
  repo-path:
    description: "Path to the repository root to validate."
    required: false
    default: "."
  manifest:
    description: "Explicit path to the manifest. Auto-discovered as repo-guard.json if omitted."
    required: false
    default: ""
  fail-on-drift:
    description: "Fail the job if error-level violations are found."
    required: false
    default: "true"
  format:
    description: "Report format: pretty or json."
    required: false
    default: "pretty"
  report-path:
    description: "Where to write the JSON report artifact."
    required: false
    default: "code-admit-gate-report.json"

outputs:
  errors:
    description: "Number of error-level violations."
    value: ${{ steps.guard.outputs.errors }}
  warnings:
    description: "Number of warning-level violations."
    value: ${{ steps.guard.outputs.warnings }}
  status:
    description: "ACTIVE if a manifest was found, DORMANT otherwise."
    value: ${{ steps.guard.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run Code Admit Gate
      id: guard
      shell: bash
      run: |
        set -o pipefail

        GUARD="${{ github.action_path }}/src/code_admit_gate.py"
        if [ ! -f "$GUARD" ]; then
          echo "Code Admit Gate validator not found at $GUARD" >&2
          exit 2
        fi

        ARGS=(--repo "${{ inputs.repo-path }}" --format "${{ inputs.format }}" --output "${{ inputs.report-path }}")

        if [ -n "${{ inputs.manifest }}" ]; then
          ARGS+=(--manifest "${{ inputs.manifest }}")
        fi

        if [ "${{ inputs.fail-on-drift }}" = "true" ]; then
          ARGS+=(--fail-on-drift)
        fi

        set +e
        python "$GUARD" "${ARGS[@]}" | tee guard_output.txt
        GUARD_EXIT=${PIPESTATUS[0]}
        set -e

        if [ -f "${{ inputs.report-path }}" ]; then
          REPORT_PATH="${{ inputs.report-path }}" python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        report_path = os.environ["REPORT_PATH"]
        with open(report_path, "r", encoding="utf-8") as handle:
            report = json.load(handle)

        summary = report.get("summary", {})
        print(f"errors={summary.get('errors', 0)}")
        print(f"warnings={summary.get('warnings', 0)}")
        print(f"status={'ACTIVE' if report.get('manifest_found') else 'DORMANT'}")
        PY
        else
          echo "errors=0" >> "$GITHUB_OUTPUT"
          echo "warnings=0" >> "$GITHUB_OUTPUT"
          echo "status=UNKNOWN" >> "$GITHUB_OUTPUT"
        fi

        exit "$GUARD_EXIT"

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repo-guard-report
        path: ${{ inputs.report-path }}
        if-no-files-found: warn
